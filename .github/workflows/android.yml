name: Build Android APK

on:
  push:
    branches:
      - claude/zen-albattani-ajer3f
      - claude/exciting-edison-8gwzrt
      - main
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-mode-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to a release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-build-${{ github.run_number }}
          name: 抖音模式 APK (build ${{ github.run_number }})
          prerelease: true
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            自动构建的调试版 APK，直接下载 `app-debug.apk` 安装即可。
            提交: ${{ github.sha }}
